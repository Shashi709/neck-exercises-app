<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neck Exercises Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-primary: #f6f8fa;
      --bg-secondary: #fff;
      --text-primary: #21232a;
      --text-secondary: #5a6271;
      --border-color: #e5e9f1;
      --shadow-color: #dde2ec40;
    }

    html.dark-mode {
      --bg-primary: #1a1a2e;
      --bg-secondary: #2d2d44;
      --text-primary: #e8e8f0;
      --text-secondary: #b0b0c0;
      --border-color: #404060;
      --shadow-color: #00000040;
    }

    html, body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: var(--bg-primary);
      margin:0; padding:0;
      min-height: 100%;
      color: var(--text-primary);
      letter-spacing: 0.01em;
      transition: background 0.3s, color 0.3s;
    }
    *, *:before, *:after { box-sizing: border-box; }

    h1 {
      text-align:center;
      color: #223366;
      margin:36px 0 18px 0;
      font-size:2.07em;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-shadow: 0 1.5px 0 #e3e7ee;
    }

    html.dark-mode h1 {
      color: #a8d5ff;
      text-shadow: 0 1.5px 0 rgba(0,0,0,0.3);
    }

    .dark-mode-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 50px;
      padding: 10px 15px;
      cursor: pointer;
      font-size: 1.3em;
      transition: all 0.3s ease;
      box-shadow: 0 2px 10px var(--shadow-color);
      z-index: 1000;
    }

    .dark-mode-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 15px var(--shadow-color);
    }

    #landingPage {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .landing-content {
      text-align: center;
      max-width: 600px;
    }

    .landing-content h1 {
      margin: 0 0 20px 0;
      font-size: 2.5em;
    }

    .landing-content p {
      font-size: 1.15em;
      color: #5a6271;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    html.dark-mode .landing-content p {
      color: var(--text-secondary);
    }

    .option-buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
    }

    .option-btn {
      padding: 20px 40px;
      font-size: 1.2em;
      border-radius: 15px;
      border: 2px solid;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 160px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .option-btn.fast {
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
      color: white;
      border-color: #ff5252;
      box-shadow: 0 8px 24px rgba(255, 107, 107, 0.3);
    }

    .option-btn.fast:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(255, 107, 107, 0.4);
    }

    .option-btn.normal {
      background: linear-gradient(135deg, #4ecdc4 0%, #44b8b0 100%);
      color: white;
      border-color: #3eb5a5;
      box-shadow: 0 8px 24px rgba(78, 205, 196, 0.3);
    }

    .option-btn.normal:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(78, 205, 196, 0.4);
    }

    .option-btn.it {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: #5a6fd8;
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
    }

    .option-btn.it:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
    }

    #exercisePage {
      display: none;
    }

    .container {
      max-width:700px;
      margin:auto;
      padding:18px 10px 32px 10px;
    }

    .back-btn {
      margin-bottom: 20px;
      padding: 10px 20px;
      font-size: 0.95em;
      background: #e9eef6;
      color: #223366;
      border: 1.5px solid #d2d9e7;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: #dce5f0;
      border-color: #c5cde6;
    }

    .routine-header {
      text-align: center;
      margin-bottom: 20px;
      padding: 15px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .routine-header h2 {
      margin: 0;
      color: #223366;
      font-size: 1.8em;
    }

    .routine-header .badge {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: 600;
      margin-top: 10px;
    }

    .routine-header .badge.fast {
      background: #ffe0e0;
      color: #d32f2f;
    }

    .routine-header .badge.normal {
      background: #e0f7f6;
      color: #00897b;
    }

    .routine-header .badge.it {
      background: #e8e0ff;
      color: #5a4fcf;
    }

    .section-head {
      margin:38px 0 18px 0;
      font-size:1.14em;
      font-weight: 600;
      color:#4a6078;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 1px 4px #c8d0db13;
      padding: 8px 18px;
      border: 1px solid #e5e9f1;
      position: relative;
    }

    html.dark-mode .section-head {
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border-color: var(--border-color);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .exercise-box {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 6px 32px 0 #dde2ec40, 0 1px 2px #d9dee9;
      margin-bottom: 30px;
      padding: 28px 22px 20px 22px;
      position:relative;
      border: 1px solid #e5e9f1;
      transition: box-shadow 0.18s, border 0.16s;
    }

    html.dark-mode .exercise-box {
      background: var(--bg-secondary);
      border-color: var(--border-color);
      box-shadow: 0 6px 32px rgba(0,0,0,0.3);
    }
    .exercise-box.active {
      box-shadow: 0 10px 42px #c4cee355, 0 1.5px 6px #b8c9df42;
      border-color: #bccbe6;
    }

    .ex-header {
      display:flex; align-items:flex-start;
      margin-bottom:13px; gap:16px;
    }
    .ex-icon {
      min-width:56px; min-height:56px;
      width:56px; height:56px;
      background: #f5f7fb;
      border-radius: 10px;
      display:flex; align-items:center; justify-content:center;
      font-size:2.2em; flex-shrink:0; margin-top:2px;
      box-shadow: 0 1.5px 10px #e6eaf7, 0 2px 4px #f5f7fa inset;
      border: 1.5px solid #f1f4fa;
      transition: box-shadow 0.12s, border 0.15s;
    }
    .exercise-box.active .ex-icon {
      box-shadow: 0 3px 20px #c6d4ec80;
      border-color: #dde8f8;
    }

    .ex-content { flex:1;}
    .ex-title {
      font-weight:700;
      font-size:1.10em;
      color:#223366;
      margin-bottom:4px;
    }
    .ex-desc {
      color:#5a6271;
      font-size:1em;
      margin:5px 0 0 0;
      font-weight:400;
      line-height:1.52;
      letter-spacing:0.01em;
    }

    html.dark-mode .ex-title {
      color: #a8d5ff;
    }

    html.dark-mode .ex-desc {
      color: var(--text-secondary);
    }

    .inputs-row {
      margin:13px 0 8px 0;
      display:flex;
      gap:16px;
      align-items:center;
      flex-wrap:wrap;
    }
    label {
      font-size:0.99em;
      color:#425375;
      font-weight:500;
    }
    input[type='number'] {
      width:62px; padding:5px 10px;
      font-size:1em;
      border-radius:7px;
      border:1.3px solid #d2d9e7;
      background: #f8fafc;
      margin-left:7px;
      color:#223355;
      font-weight:600;
      box-shadow: 0 2px 7px #f4f7fa05;
      outline:none;
      transition: border 0.18s, box-shadow 0.17s;
    }

    html.dark-mode input[type='number'] {
      border-color: var(--border-color);
      background: #3a3a50;
      color: #e8e8f0;
    }

    input[type='number']:focus {
      border:2px solid #a1b4de;
      background: #fff;
    }

    html.dark-mode input[type='number']:focus {
      border:2px solid #667eea;
      background: #4a4a60;
    }

    .btn-row {
      display:flex; gap:9px;
      margin-top:12px;
      flex-wrap:wrap;
    }
    button {
      padding:9px 23px;
      font-size:1.03em;
      border-radius:11px;
      border:none;
      font-weight:700;
      cursor:pointer;
      background: #f4f7fb;
      color:#2a3350;
      border: 1.2px solid #e5e9f1;
      box-shadow: 0 1.5px 8px #dde3ef20;
      transition: background 0.18s, box-shadow 0.15s, color 0.13s, border 0.14s, transform 0.12s;
    }

    html.dark-mode button {
      background: #3a3a50;
      color: #b0b0c0;
      border-color: var(--border-color);
      box-shadow: 0 1.5px 8px rgba(0,0,0,0.3);
    }

    button:hover, button:focus {
      background: #e9eef6;
      color: #003366;
      border-color: #c9d2e3;
      box-shadow: 0 4px 18px #ccd6e420;
    }

    html.dark-mode button:hover, html.dark-mode button:focus {
      background: #4a4a60;
      color: #a8d5ff;
      border-color: #667eea;
    }
    button:active {
      background: #e0e8f2;
      color: #18223b;
      transform: scale(0.98);
    }
    .start {font-weight:800;}
    .pause {color:#aa7600;}
    .resume {color:#18604b;}
    .reset {color:#a43939;}
    button:disabled {
      background: #f3f5f9;
      color: #c5c7cb;
      cursor: not-allowed;
      border-color: #f3f5fa;
      box-shadow: none;
    }

    .counter-row {
      display:flex; gap:14px; align-items:center;
      margin:13px 0 2px 0; flex-wrap:wrap;
      font-size:1em;
    }
    .big-num {
      font-size:1.22em;
      color:#234288;
      min-width:28px;
      display:inline-block;
      font-weight:700;
    }
    .active .big-num,
    .big-num.pulse {
      color:#3063b1;
    }
    .total-time {
      font-size:0.97em;
      color:#57647d;
      background: #f4f6fa;
      padding: 3px 10px;
      border-radius: 6px;
      font-weight: 600;
      box-shadow: 0 0 7px #dce5f33b;
      border: 1.1px solid #e5eaf4;
      margin-left:4px;
    }

    .progress-txt {
      font-size:1.01em;
      font-weight:600;
      color:#397857;
      margin-top:8px;
      min-height: 16px;
      letter-spacing: 0.01em;
      padding-left: 2px;
    }
    .danger {
      color:#d94343;
      background: #f8f2f2;
      border-radius: 7px;
      padding: 7px 11px 6px 11px;
      font-weight:700;
      box-shadow: 0 0 12px #f2d0d0;
      margin-bottom: 15px;
      display:inline-block;
      border: 1.1px solid #efdddd;
      letter-spacing: 0.03em;
    }

    html.dark-mode .danger {
      background: #4a2a2a;
      box-shadow: 0 0 12px rgba(217, 67, 67, 0.3);
      border-color: #6a4a4a;
    }
    .warning {color:#ad7b0c;}
    .progress-txt.danger {animation: shake 0.35s 1;}
    .progress-txt.warning {animation: flashWarn 0.5s 1;}

    @keyframes shake {
      20% {transform: translateX(-4px);}
      40% {transform: translateX(5px);}
      60% {transform: translateX(-3px);}
      80% {transform: translateX(2px);}
      100% {transform: translateX(0);}
    }
    @keyframes flashWarn {
      0% {color:#eaaa13;}
      80% {color:#ad7b0c;}
      100% {color:#ad7b0c;}
    }
    .big-num.pulse {
      animation: pulseGrow 0.16s cubic-bezier(.57,.24,.77,1.36);
    }
    @keyframes pulseGrow {
      0% { transform: scale(1);}
      50% { transform: scale(1.15);}
      100% { transform: scale(1);}
    }

    @media (max-width: 700px){
      h1 {font-size: 1.2em;}
      .container{padding:7px 1.5vw;}
      .section-head{font-size: 0.98em; padding: 7px 6px;}
      .exercise-box{padding:10px 3px 7px 3px;}
      .ex-header{flex-direction:column; gap:7px;}
      .ex-icon{width:36px;min-width:36px;height:36px;min-height:36px;font-size:1.05em;}
      .btn-row button{width:99%; font-size:0.95em;}
      .counter-row{gap:7px;}
      .inputs-row{gap:7px;}
      .option-btn {padding: 15px 30px; font-size: 1em; min-width: 140px;}
    }
    @media (max-width:400px){
      .exercise-box {padding:5px 1vw 5px 1vw;}
      .section-head{font-size:0.91em;}
      .ex-title{font-size:1.04em;}
      .option-buttons {gap: 10px;}
      .option-btn {padding: 12px 20px; font-size: 0.9em; min-width: 100px;}
      .landing-content h1 {font-size: 1.8em;}
    }
  </style>
</head>
<body>
  <!-- Dark Mode Toggle -->
  <button class="dark-mode-toggle" id="darkModeToggle" onclick="toggleDarkMode()" title="Toggle Dark Mode">🌙</button>

  <!-- Landing Page -->
  <div id="landingPage">
    <div class="landing-content">
      <h1>🏥 Neck Exercises</h1>
      <p>Safe, beginner-friendly cervical exercises for neck pain relief</p>
      <div class="option-buttons">
        <button class="option-btn fast" onclick="startRoutine('fast')">⚡ FAST (6-7 MIN)</button>
        <button class="option-btn it" onclick="startRoutine('it')">🧠 IT ROUTINE (20-25 MIN)</button>
      </div>
    </div>
  </div>

  <!-- Exercise Page -->
  <div id="exercisePage">
    <button class="back-btn" onclick="goBack()">← Back to Menu</button>
    <div class="container">
      <div class="routine-header">
        <h2 id="routineTitle">Neck Exercises</h2>
        <span class="badge" id="routineBadge"></span>
      </div>
      <div style="margin:16px 0 12px 0; text-align:center;">
        <span class="danger">⚠️ If you experience any pain, STOP exercising immediately!</span>
      </div>
      <div id="exerciseContainer"></div>
    </div>
  </div>

  <!-- Use Google beep sound for max compatibility -->
  <audio id="beep-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<script>
// Dark Mode Toggle
function toggleDarkMode() {
  const html = document.documentElement;
  html.classList.toggle('dark-mode');
  
  const isDarkMode = html.classList.contains('dark-mode');
  localStorage.setItem('darkMode', isDarkMode);
  
  const toggle = document.getElementById('darkModeToggle');
  toggle.textContent = isDarkMode ? '☀️' : '🌙';
}

// Initialize dark mode from localStorage
function initDarkMode() {
  const isDarkMode = localStorage.getItem('darkMode') === 'true';
  if (isDarkMode) {
    document.documentElement.classList.add('dark-mode');
    document.getElementById('darkModeToggle').textContent = '☀️';
  }
}

// Call on page load
initDarkMode();

// Exercise routines configuration
const exerciseRoutines = {

          {

            defaultReps: 10, defaultSeconds: 6
          },
          {

            icon: "↔️",

            defaultReps: 10, defaultSeconds: 6
          }
        ]
      },
      {

        exercises: [
          {

            description: "Push forehead into hands (front), then push back of head into hands (back). Hold gently - no jerky movements!",
            defaultReps: 8, defaultSeconds: 8
          },
          {
            name: "Side Neck Isometric (Left + Right)",
            icon: "<span>🧑🤚</span><span style='margin-left:-6px;'>🤚🧑</span>",
            description: "Place hand on left side of head. Push head against hand (no movement), then switch to right. Gentle pressure only!",
            defaultReps: 8, defaultSeconds: 8
          },
          {
            name: "Shoulder Shrugs",
            icon: "🤷",
            description: "Move your shoulders up towards your ears, then relax. Slow and controlled motion.",
            defaultReps: 10, defaultSeconds: 2
          },
          {
            name: "Arm Swinging",

      }

  },
  normal: {
    title: "✓ Normal Neck Exercise Routine (25-26 Minutes)",
    badge: "NORMAL MODE - 25-26 MIN",
    badgeClass: "normal",
    sections: [
      {
        title: "Warm-up Exercises",
        exercises: [
          {
            name: "Neck Rotation",

            description: "Slowly turn your head left and right. Don't force, stay gentle.",
            defaultReps: 20, defaultSeconds: 12
          },
          {
            name: "Neck Side Bending",
            icon: "↔️",
            description: "Slowly bend your head so your ear moves towards shoulder (left/right). Shoulders relaxed.",
            defaultReps: 20, defaultSeconds: 12
          }
        ]
      },
      {
        title: "Strengthening Exercises",
        exercises: [
          {

            defaultReps: 20, defaultSeconds: 12
          },
          {

            icon: "🤷",
            description: "Move your shoulders up towards your ears, then relax to original position.",

          },
          {
            name: "Arm Swinging",
            icon: "💪↔️",
            description: "Move your arms forward and backward as shown (see picture/guide if unsure).",
            defaultReps: 8, defaultSeconds: 10
          }
        ]
      }
    ]
  },
  it: {
    title: "🧠 IT Person Neck Recovery Routine (20–25 Minutes)",
    badge: "IT MODE - 20-25 MIN",
    badgeClass: "it",
    sections: [
      {
        title: "🔥 Warm-up (5 Minute)",

            defaultReps: 10, defaultSeconds: 6
          },
          {

            icon: "↕️",
            description: "Gardan ko niche (chin chest) aur upar le jaye. Reps: 8–10",
            defaultReps: 10, defaultSeconds: 4
          },
          {
            name: "Side Bending",

            description: "Kaan ko shoulder ki taraf le jaye (shoulder stable rakhe). Reps: 8–10 each side",

      {

// --- Beep logic ---
const beep = document.getElementById('beep-sound');

// Unlock audio on first interaction
let audioUnlocked = false;
function unlockAudio() {
  if (!audioUnlocked) {
    beep.muted = true;
    beep.play().catch(()=>{});
    setTimeout(() => {
      beep.pause(); beep.currentTime=0;
      beep.muted = false;
    }, 100);
    audioUnlocked = true;
  }
}
window.addEventListener('mousedown', unlockAudio, {once:true});
window.addEventListener('touchstart', unlockAudio, {once:true});

function playBeep(repeats) {
  let played = 0;
  const interval = setInterval(() => {
    beep.currentTime = 0;
    beep.play();
    played++;
    if (played >= repeats) clearInterval(interval);
  }, 250);
}

// --- UI rendering and timer logic ---
function formatTime(secs) {
  let m = Math.floor(secs/60), s = secs%60;
  return `${m}:${s<10?'0':''}${s}`;
}

function renderExercises(exerciseSections) {
  const exContainer = document.getElementById('exerciseContainer');
  exContainer.innerHTML = '';
  
  exerciseSections.forEach((sec, secIdx) => {
    const sectionHead = document.createElement('div');
    sectionHead.className = "section-head";
    sectionHead.textContent = sec.title;
    exContainer.appendChild(sectionHead);

    sec.exercises.forEach((ex, idx) => {
      const exBox = document.createElement('div');
      exBox.className = "exercise-box";
      let iconHTML = ex.icon.startsWith('<span') ? ex.icon : `<span>${ex.icon}</span>`;
      exBox.innerHTML = `
        <div class="ex-header">
          <div class="ex-icon">${iconHTML}</div>
          <div class="ex-content">
            <div class="ex-title">${ex.name}</div>
            <div class="ex-desc">${ex.description}</div>
          </div>
        </div>
        <div class="inputs-row">
          <label>Reps:
            <input type="number" min="1" max="99" value="${ex.defaultReps}" id="reps_${secIdx}_${idx}">
          </label>
          <label>Time/Rep (sec):
            <input type="number" min="1" max="99" value="${ex.defaultSeconds}" id="seconds_${secIdx}_${idx}">
          </label>
        </div>
        <div class="btn-row">
          <button class="start"    id="start_${secIdx}_${idx}">Start</button>
          <button class="pause"    id="pause_${secIdx}_${idx}" style="display:none;">Pause</button>
          <button class="resume"   id="resume_${secIdx}_${idx}" style="display:none;">Resume</button>
          <button class="reset"    id="reset_${secIdx}_${idx}"  style="display:none;">Reset</button>
        </div>
        <div class="counter-row">
          <span>Rep: <span class="big-num" id="currRep_${secIdx}_${idx}">0</span>/<span id="maxRep_${secIdx}_${idx}">${ex.defaultReps}</span></span>
          <span>Time: <span class="big-num" id="currSec_${secIdx}_${idx}">0</span>/<span id="maxSec_${secIdx}_${idx}">${ex.defaultSeconds}</span> sec</span>
          <span class="total-time">Total: <span id="totalTime_${secIdx}_${idx}">0:00</span></span>
        </div>
        <div class="progress-txt" id="progressTxt_${secIdx}_${idx}">&nbsp;</div>
      `;
      exContainer.appendChild(exBox);

      let state = {
        running: false, paused: false, finished: false,
        rep: 0, sec: 0, total: 0, interval: null,
        reps: ex.defaultReps, perSec: ex.defaultSeconds,
      };

      const repInp = document.getElementById(`reps_${secIdx}_${idx}`);
      const secInp = document.getElementById(`seconds_${secIdx}_${idx}`);
      const startBtn = document.getElementById(`start_${secIdx}_${idx}`);
      const pauseBtn = document.getElementById(`pause_${secIdx}_${idx}`);
      const resumeBtn = document.getElementById(`resume_${secIdx}_${idx}`);
      const resetBtn = document.getElementById(`reset_${secIdx}_${idx}`);
      const currRep = document.getElementById(`currRep_${secIdx}_${idx}`);
      const maxRep = document.getElementById(`maxRep_${secIdx}_${idx}`);
      const currSec = document.getElementById(`currSec_${secIdx}_${idx}`);
      const maxSec = document.getElementById(`maxSec_${secIdx}_${idx}`);
      const totalTime = document.getElementById(`totalTime_${secIdx}_${idx}`);
      const progressTxt = document.getElementById(`progressTxt_${secIdx}_${idx}`);

      function updateDisplay() {
        currRep.innerText = state.rep;
        maxRep.innerText = state.reps;
        currSec.innerText = state.sec;
        maxSec.innerText = state.perSec;
        totalTime.innerText = formatTime(state.total);
        if(state.finished) {
          progressTxt.innerText = "WELL DONE! Exercise complete.";
          progressTxt.className = "progress-txt danger";
          exBox.classList.remove("active");
        }
        else if(state.rep>=state.reps) {
          progressTxt.innerText = "Completed! Press Reset to repeat.";
          progressTxt.className = "progress-txt warning";
          exBox.classList.remove("active");
        }
        else if(state.running) {
          let left = state.reps - state.rep;
          progressTxt.innerText = left==0 ? "Last rep!" : (left==1 ? "Last one, keep going!" : `Only ${left} left!`);
          progressTxt.className = "progress-txt";
          exBox.classList.add("active");
        } else if(state.paused) {
          progressTxt.innerText = "Paused";
          progressTxt.className = "progress-txt warning";
        } else {
          progressTxt.innerHTML = "&nbsp;";
          progressTxt.className = "progress-txt";
          exBox.classList.remove("active");
        }
      }
      function disableInputs(dis) {
        repInp.disabled = dis;
        secInp.disabled = dis;
      }
      function start() {
        state.reps = parseInt(repInp.value)||1;
        state.perSec = parseInt(secInp.value)||1;
        state.rep = 0; state.sec = 0; state.total=0;
        state.running=true; state.paused=false; state.finished=false;
        disableInputs(true);
        currRep.classList.remove('pulse');
        currSec.classList.remove('pulse');
        updateDisplay();
        startBtn.style.display='none';
        pauseBtn.style.display='';
        resumeBtn.style.display='none';
        resetBtn.style.display='';
        exBox.classList.add("active");
        state.interval = setInterval(() => {
          if(state.paused||state.finished) return;
          state.sec++; state.total++;
          currSec.classList.add('pulse');
          setTimeout(()=>currSec.classList.remove('pulse'),220);
          if(state.sec>=state.perSec) {
            state.sec=0;
            state.rep++;
            currRep.classList.add('pulse');
            setTimeout(()=>currRep.classList.remove('pulse'),200);
            playBeep(2);
            if(state.rep>=state.reps) {
              clearInterval(state.interval); state.interval=null;
              state.running=false; state.finished=true;
              setTimeout(()=>playBeep(7), 350);
            }
          }
          updateDisplay();
        },1000);
      }
      function pause() {
        if(state.running && !state.paused){
          state.paused=true; state.running=false;
          clearInterval(state.interval); state.interval=null;
          pauseBtn.style.display='none'; resumeBtn.style.display='';
          exBox.classList.remove("active");
          updateDisplay();
        }
      }
      function resume() {
        if(state.paused && !state.running){
          state.paused=false; state.running=true;
          pauseBtn.style.display=''; resumeBtn.style.display='none';
          exBox.classList.add("active");
          state.interval = setInterval(() => {
            if(state.paused||state.finished) return;
            state.sec++; state.total++;
            currSec.classList.add('pulse');
            setTimeout(()=>currSec.classList.remove('pulse'),220);
            if(state.sec>=state.perSec) {
              state.sec=0; state.rep++;
              currRep.classList.add('pulse');
              setTimeout(()=>currRep.classList.remove('pulse'),200);
              playBeep(2);
              if(state.rep>=state.reps) {
                clearInterval(state.interval); state.interval=null;
                state.running=false; state.finished=true;
                setTimeout(()=>playBeep(7),350);
              }
            }
            updateDisplay();
          },1000);
          updateDisplay();
        }
      }
      function reset() {
        if(state.interval) {clearInterval(state.interval);}
        state.rep=0; state.sec=0; state.total=0;
        state.running=false; state.paused=false; state.finished=false;
        updateDisplay();
        startBtn.style.display=''; pauseBtn.style.display='none'; resumeBtn.style.display='none'; resetBtn.style.display='none';
        disableInputs(false);
        exBox.classList.remove("active");
      }
      startBtn.onclick = start;
      pauseBtn.onclick = pause;
      resumeBtn.onclick = resume;
      resetBtn.onclick = reset;
      repInp.addEventListener('change', reset);
      secInp.addEventListener('change', reset);
      updateDisplay(); pauseBtn.style.display='none'; resumeBtn.style.display='none'; resetBtn.style.display='none';
    });
  });
}
